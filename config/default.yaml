simulation:
  seed: 42
  duration: 8640          # simulation time units (e.g., 720 = 30 days × 24 hours)
  time_unit: "hour"
  period_length: 24      # re-evaluate activity every 24 time units (1 day)

service:
  base_p_fail: 0.05
  base_p_correct: 0.10
  mu_fast: 0.033           # mean response time (time units) for uncorrected path
  sigma_fast: 0.0001
  mu_slow: 8.0           # mean response time (time units) for corrected path
  sigma_slow: 2.0
  base_p_approve: 0.98
  base_reward: 20         # tokens per approved receipt

population:
  size: 1000
  lambda_alpha: 2.0       # Gamma shape for submission rate
  lambda_beta: 1.0        # Gamma scale for submission rate
  quality_a: 5.0          # Beta shape a for receipt quality
  quality_b: 2.0          # Beta shape b for receipt quality
  engagement_a: 4.0       # Beta shape a for baseline engagement
  engagement_b: 3.0       # Beta shape b for baseline engagement
  tenure_max_months: 60   # max panel tenure for generation
  dirichlet_concentration: 5.0  # concentration for retailer mix perturbation

  # Category weights for segmentation attribute assignment (must sum to 1.0 within each group)
  age_groups:
    "18-24": 0.12
    "25-34": 0.22
    "35-44": 0.24
    "45-54": 0.20
    "55-64": 0.14
    "65+": 0.08
  lifestages:
    "Young Adult": 0.15
    "Young Family": 0.25
    "Middle Family": 0.25
    "Older Family": 0.20
    "Retired": 0.15
  social_grades:
    "AB": 0.25
    "C1": 0.30
    "C2": 0.25
    "DE": 0.20
  geographies:
    "London": 0.15
    "South East": 0.14
    "South West": 0.09
    "East": 0.10
    "West Midlands": 0.10
    "East Midlands": 0.08
    "North West": 0.12
    "North East": 0.05
    "Yorkshire": 0.09
    "Scotland": 0.08
  household_size_weights:
    1: 0.15
    2: 0.30
    3: 0.20
    4: 0.20
    5: 0.10
    6: 0.05
  pet_dog_probability: 0.30
  pet_cat_probability: 0.25

activity:
  # Monthly seasonal multipliers (Jan=0 through Dec=11)
  seasonal_multipliers:
    - -0.3   # Jan (post-Christmas dip)
    - -0.1   # Feb
    - 0.1    # Mar (Easter run-up)
    - 0.15   # Apr (Easter)
    - 0.0    # May
    - -0.1   # Jun
    - -0.2   # Jul (summer holiday dip)
    - 0.1    # Aug (back to school)
    - 0.15   # Sep (back to school)
    - 0.1    # Oct
    - 0.3    # Nov (Black Friday, Christmas run-up)
    - 0.4    # Dec (Christmas peak)
  segmentation_weights:
    household_size_per_extra: 0.1    # additive per household member above 1
    family_lifestage_boost: 0.15     # for Young Family, Middle Family
    pet_owner_boost: 0.05            # per pet type owned
    high_social_grade_boost: 0.05    # for AB
    low_social_grade_penalty: -0.05  # for DE
  tenure_decay_rate: 0.005           # per month of tenure

retailers:
  grocery_major:
    fail_modifier: 0.6
    correct_modifier: 0.5
    mix_weight: 0.35
  grocery_discounter:
    fail_modifier: 0.5
    correct_modifier: 0.4
    mix_weight: 0.15
  convenience:
    fail_modifier: 1.2
    correct_modifier: 1.3
    mix_weight: 0.12
  online:
    fail_modifier: 0.4
    correct_modifier: 1.1
    mix_weight: 0.10
  health_beauty:
    fail_modifier: 0.5
    correct_modifier: 0.5
    mix_weight: 0.08
  general_merchandise:
    fail_modifier: 1.0
    correct_modifier: 1.2
    mix_weight: 0.08
  independent:
    fail_modifier: 2.0
    correct_modifier: 2.0
    mix_weight: 0.07
  fuel:
    fail_modifier: 1.1
    correct_modifier: 0.7
    mix_weight: 0.05
